name: compas_fab
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.9
  - pip
  - pybullet
  - pip:
    - compas >= 2.0.4, < 3
    - compas_robots >= 0.3, < 1
    - roslibpy >= 1.1, < 2
    - pyserial
    - attrs >=19.3.0
    - black
    - bump2version >=1.0.1
    - check-manifest >=0.36
    - compas-invocations2
    - ruff
    - importlib_metadata <5.0
    - invoke>=0.14
    - pytest
    - pytest_mock
    - pytest-cov
    - sphinx_compas2_theme
    - sybil~=8.0.1
    - twine
    - tomlkit
