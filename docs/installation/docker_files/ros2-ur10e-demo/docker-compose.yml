x-ros-env: &ros-env
  ROS_DOMAIN_ID: "42"
  RMW_IMPLEMENTATION: rmw_zenoh_cpp
  # Despite the *_URI name, this wants a plain filesystem path, not a file:// URI.
  ZENOH_SESSION_CONFIG_URI: /etc/zenoh/session.json5
  # Wait forever for the zenoh-router to come up rather than failing fast.
  ZENOH_ROUTER_CHECK_ATTEMPTS: "-1"

services:
  ur-sim:
    image: universalrobots/ursim_e-series:latest
    container_name: ur-sim
    # URSim ships amd64-only. Apple Silicon runs it under emulation.
    platform: linux/amd64
    environment:
      # UR10 in the e-series image means UR10e. Other valid values: UR3, UR5, UR16.
      - ROBOT_MODEL=UR10
    ports:
      - "5900:5900"   # VNC for the simulated teach pendant
      - "6080:6080"   # noVNC web view of the simulated teach pendant

  # Zenoh router that federates traffic for all ROS 2 nodes in this stack.
  # Replaces DDS discovery — every ROS service is a Zenoh client pointing
  # at this router via /etc/zenoh/session.json5.
  zenoh-router:
    build: .
    image: compas-fab/ros-jazzy-moveit2-ur10e
    container_name: zenoh-router
    environment:
      <<: *ros-env
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && exec ros2 run rmw_zenoh_cpp rmw_zenohd

  ur-driver:
    image: compas-fab/ros-jazzy-moveit2-ur10e
    container_name: ur-driver
    environment:
      <<: *ros-env
    depends_on:
      - ur-sim
      - zenoh-router
    # `launch_rviz:=false` here disables the driver's bare-bones RViz — we get a
    # richer planning-scene RViz from `ur_moveit.launch.py` in `moveit-demo`.
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur10e robot_ip:=ur-sim launch_rviz:=false initial_joint_controller:=joint_trajectory_controller update_rate_config_file:=/etc/compas_fab/update_rate.yaml

  moveit-demo:
    image: compas-fab/ros-jazzy-moveit2-ur10e
    container_name: moveit-demo
    environment:
      <<: *ros-env
      # RViz is rendered into the `gui` service's X11 server (see below) and viewable
      # at http://localhost:8080/vnc.html. To use a native X server instead (XQuartz on
      # macOS, VcXsrv on Windows, native on Linux), comment the line below and uncomment
      # this one:
      # DISPLAY: host.docker.internal:0.0
      DISPLAY: gui:0.0
    depends_on:
      - ur-driver
      - zenoh-router
      - gui
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 launch ur_moveit_config ur_moveit.launch.py ur_type:=ur10e launch_rviz:=true

  ros-bridge:
    image: compas-fab/ros-jazzy-moveit2-ur10e
    container_name: ros-bridge
    environment:
      <<: *ros-env
    ports:
      - "9090:9090"
    depends_on:
      - ur-driver
      - zenoh-router
    command:
      - bash
      - -lc
      - source /opt/ros/jazzy/setup.bash && ros2 launch rosbridge_server rosbridge_websocket_launch.xml

  file-server:
    image: compas-fab/ros-jazzy-moveit2-ur10e
    container_name: file-server
    ports:
      - "9091:9091"
    working_dir: /opt/ros/jazzy/share
    command:
      - python3
      - -m
      - http.server
      - "9091"

  # Web-based X11 server. Reachable as `gui` on the Docker network so other services
  # can render into it via `DISPLAY=gui:0.0`. The noVNC web client is at
  # http://localhost:8080/vnc.html.
  gui:
    image: theasp/novnc:latest
    container_name: gui
    # theasp/novnc only ships amd64 manifests; force the platform so Docker stops
    # complaining on arm64 hosts (Apple Silicon). Rosetta 2 / qemu handle the emulation.
    platform: linux/amd64
    # environment:
    #   - DISPLAY_WIDTH=1600
    #   - DISPLAY_HEIGHT=900
    ports:
      - "8080:8080"
